services:
  postgres_db_dev:
    image: postgres:16-alpine
    container_name: postgres_db_dev_container
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: db_pass_2026
      POSTGRES_DB: store_development
    ports:
      - "5432:5432"
    volumes:
      - store_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_admin -d store_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_db_test:
    image: postgres:16-alpine
    container_name: postgres_db_test_container
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: db_pass_2026
      POSTGRES_DB: store_testing
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_admin -d store_testing"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  store_db_data:
